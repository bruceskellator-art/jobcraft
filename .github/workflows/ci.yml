name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend: lint, type-check, test ────────────────────────────────────────
  backend:
    name: Backend (Python 3.12)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # All backend tooling runs from backend/ so pyproject.toml config
      # ([tool.mypy], [tool.ruff], [tool.pytest]) is discovered correctly.
      - name: Install backend dependencies
        working-directory: backend
        run: pip install -e '.[dev]'

      - name: Lint (ruff)
        working-directory: backend
        run: ruff check .

      - name: Type-check (mypy)
        working-directory: backend
        run: mypy app

      - name: Test (pytest)
        working-directory: backend
        run: pytest tests -q

  # ── Frontend: lint, build ───────────────────────────────────────────────────
  frontend:
    name: Frontend (Node 20)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: frontend
        # Use --frozen-lockfile when a lockfile exists; fall back for fresh checkouts
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          else
            pnpm install
          fi

      - name: Lint
        working-directory: frontend
        run: pnpm lint

      - name: Build
        working-directory: frontend
        run: pnpm build
